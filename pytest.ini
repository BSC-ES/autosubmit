[pytest]
addopts =
    --verbose
    --strict-markers
    --doctest-modules
    -n auto --max-worker-restart 0 --dist loadgroup
    -m "not docker and not postgres and not slurm and not local"
    --durations=5
# Do not include testpaths for integration and regression. This creates a single pytest
# session. We have test/conftest.py, test/unit/conftest.py, test/integration/conftest.py,
# and test/regression/conftest.py.
#
# Each of these files is setting up fixtures for the different test types. When we load
# all the test paths together, that creates a single session. All the fixtures with scope
# fixture are loaded. This causes some mocks needed for regression and integration to be
# active during unit tests.
#
# Depending on the order of the executions, if pytest-xdist is used, the number of cores,
# we get different (and very hard to debug) test failures. Run each test type separately.
testpaths =
    test/unit
    autosubmit
doctest_optionflags =
    NORMALIZE_WHITESPACE
    IGNORE_EXCEPTION_DETAIL
    ELLIPSIS
markers =
    docker: marks a test that requires docker to run.
    slurm: marks a test that requires a Slurm container to run.
    git: marks a test that requires a Git server to run.
    svn: marks a test that requires a SVN server to run.
    postgres: mark a test that requires postgres to run.
    ssh: marks a test that requires an SSH server.
    x11: marks a test that requires an SSH server with X11 enabled.
    mfa: marks a test that requires an SSH server with MFA enabled.
    local: marks a test that must run locally.
